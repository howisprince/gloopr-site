<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOOPR Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .tab-btn.active { border-bottom: 2px solid #10b981; color: #10b981; }
    </style>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="text-gray-800">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">GLOOPR Admin</h1>
            <a href="/" class="text-blue-500 hover:underline">View Site</a>
        </header>

        <div class="flex border-b mb-6">
            <button class="tab-btn active px-4 py-2 font-medium" onclick="switchTab('bookings')">Bookings</button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-gray-700" onclick="switchTab('packages')">Packages & Pricing</button>
        </div>

        <!-- Bookings Tab -->
        <div id="bookings-tab">
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID / Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Service</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-list" class="bg-white divide-y divide-gray-200">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Packages Tab -->
        <div id="packages-tab" class="hidden">
            <div id="packages-list" class="grid gap-6">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
